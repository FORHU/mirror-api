services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mirror_db
    ports:
      - '5440:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - '3007:3007'
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:mypassword@db:5440/mirror_db?schema=public
      - REDIS_HOST=redis

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6377:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
