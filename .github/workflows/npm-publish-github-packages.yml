name: Build and Deploy to ECS EC2

on:
    workflow_dispatch:

env:
    AWS_REGION: ap-southeast-1

    ECR_REPOSITORY: npx/mirror-api

    ECS_CLUSTER: uncommon-deer-0vc0dh
    ECS_SERVICE: uncommon-deer-0vc0dh-service

    # existing task definition file in repo
    TASK_DEFINITION_FILE: .aws/task-definition.json

    # container name INSIDE task definition
    CONTAINER_NAME: chumme-api

jobs:
    deploy:
        name: Build and Deploy
        runs-on: ubuntu-latest
        environment: dev

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
                  tags: |
                      type=sha,format=short
                      type=raw,value=latest

            - name: Build and push Docker image
              id: build-image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Render ECS task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                  task-definition: ${{ env.TASK_DEFINITION_FILE }}
                  container-name: ${{ env.CONTAINER_NAME }}
                  image: |
                      ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

            - name: Deploy ECS task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                  task-definition: ${{ steps.task-def.outputs.task-definition }}
                  service: ${{ env.ECS_SERVICE }}
                  cluster: ${{ env.ECS_CLUSTER }}
                  wait-for-service-stability: true
