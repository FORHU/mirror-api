name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build, Push & Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write  # required for OIDC AWS auth
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR="${{ steps.login-ecr.outputs.registry }}/mirror-api"
          docker build -t "$ECR:${{ github.sha }}" -t "$ECR:latest" .
          docker push "$ECR:${{ github.sha }}"
          docker push "$ECR:latest"

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/key && chmod 600 /tmp/key
          ssh -i /tmp/key -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} \
            "set -e
             aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin '${{ steps.login-ecr.outputs.registry }}'
             docker pull '${{ steps.login-ecr.outputs.registry }}/mirror-api:${{ github.sha }}'
             docker stop mirror-api 2>/dev/null || true
             docker rm mirror-api 2>/dev/null || true
             docker run -d --name mirror-api --restart unless-stopped --env-file /home/ubuntu/mirror-api.env -p 3007:3007 '${{ steps.login-ecr.outputs.registry }}/mirror-api:${{ github.sha }}'
             docker image prune -f"
          rm -f /tmp/key
