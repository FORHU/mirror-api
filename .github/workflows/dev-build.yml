name: Build and Deploy via SSH

on:
    workflow_dispatch:
        inputs:
            ref:
                description: 'Branch, tag, or SHA to deploy'
                required: true
                default: main

concurrency:
    group: mirror-api-deploy-dev
    cancel-in-progress: true

env:
    AWS_REGION: ap-southeast-1
    ECR_REPOSITORY: npx/mirror-api

    # On-host config
    CONTAINER_NAME: mirror-api
    HOST_PORT: 3000
    CONTAINER_PORT: 3000
    # Path to the .env file already placed on the EC2 host (user-managed).
    HOST_ENV_FILE: /home/ubuntu/mirror-api.env

jobs:
    deploy:
        name: Build and Deploy
        runs-on: ubuntu-latest
        environment: dev

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.ref }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
                  tags: |
                      type=sha,format=short
                      type=raw,value=latest

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Short-lived ECR token the host will use to `docker login`.
            # Masked so it never lands in logs.
            - name: Get ECR login password
              id: ecr-pw
              run: |
                  PW="$(aws ecr get-login-password --region $AWS_REGION)"
                  echo "::add-mask::$PW"
                  echo "password=$PW" >> "$GITHUB_OUTPUT"

            - name: Deploy to EC2 over SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  envs: ECR_PASSWORD,ECR_REGISTRY,IMAGE_URI,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,HOST_ENV_FILE
                  script: |
                      set -euo pipefail
                      echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
                      docker pull "$IMAGE_URI"
                      docker stop "$CONTAINER_NAME" 2>/dev/null || true
                      docker rm   "$CONTAINER_NAME" 2>/dev/null || true
                      docker run -d \
                        --name "$CONTAINER_NAME" \
                        --restart unless-stopped \
                        -p "${HOST_PORT}:${CONTAINER_PORT}" \
                        --env-file "$HOST_ENV_FILE" \
                        "$IMAGE_URI"
                      docker image prune -f
              env:
                  ECR_PASSWORD: ${{ steps.ecr-pw.outputs.password }}
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
                  CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
                  HOST_PORT: ${{ env.HOST_PORT }}
                  CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
                  HOST_ENV_FILE: ${{ env.HOST_ENV_FILE }}
