name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [staging]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: staging

concurrency:
  group: style-os-mirror-deploy-staging
  cancel-in-progress: true

env:
  ECR_REPOSITORY: style-os-mirror-staging
  AWS_REGION: ap-southeast-1
  NODE_ENV: staging
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Build, Push & Deploy (staging)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging #temp only should be moved to staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          docker build -t "$ECR:${{ env.IMAGE_TAG }}" -t "$ECR:latest" .
          docker push "$ECR:${{ env.IMAGE_TAG }}"
          docker push "$ECR:latest"

      - name: Write env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_TTL_SECONDS: ${{ secrets.REDIS_TTL_SECONDS }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ACCESS_TOKEN_EXPIRY: ${{ secrets.ACCESS_TOKEN_EXPIRY }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_VOICE_REGION: ${{ secrets.AWS_VOICE_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          S3_CDN_URL: ${{ secrets.S3_CDN_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
          MAPBOX_SECRET_TOKEN: ${{ secrets.MAPBOX_SECRET_TOKEN }}
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          FASHN_API_KEY: ${{ secrets.FASHN_API_KEY }}
          FASHN_BASE_URL: ${{ secrets.FASHN_BASE_URL }}
          FASHN_MODEL: ${{ secrets.FASHN_MODEL }}
          CHAT_WONDER_API_URL: ${{ secrets.CHAT_WONDER_API_URL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          PORT: 3007
          THIRD_PARTY_API_KEY: ${{ secrets.THIRD_PARTY_API_KEY }}
          REFRESH_TOKEN_EXPIRY: ${{ secrets.REFRESH_TOKEN_EXPIRY }}
          KIOSK_DEVICE_SECRET: ${{ secrets.KIOSK_DEVICE_SECRET }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NODE_ENV: ${{ env.NODE_ENV }}
        run: |
          cat > ${{ github.workspace }}/mirror-api.env << EOF
          DATABASE_URL=${DATABASE_URL}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS}
          ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
          ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY}
          REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          AWS_REGION=${AWS_REGION}
          AWS_VOICE_REGION=${AWS_VOICE_REGION}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
          S3_CDN_URL=${S3_CDN_URL}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}
          MAPBOX_SECRET_TOKEN=${MAPBOX_SECRET_TOKEN}
          ORS_API_KEY=${ORS_API_KEY}
          FASHN_API_KEY=${FASHN_API_KEY}
          FASHN_BASE_URL=${FASHN_BASE_URL}
          FASHN_MODEL=${FASHN_MODEL}
          CHAT_WONDER_API_URL=${CHAT_WONDER_API_URL}
          BASE_URL=${BASE_URL}
          NODE_ENV=${{ env.NODE_ENV }}
          PORT=${PORT}
          THIRD_PARTY_API_KEY=${THIRD_PARTY_API_KEY}
          REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY}
          KIOSK_DEVICE_SECRET=${KIOSK_DEVICE_SECRET}
          GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
          EOF

      - name: Copy env file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: mirror-api.env
          target: /home/ec2-user/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            chmod 600 /home/ec2-user/mirror-api.env
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker image prune -a -f
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            # Run migrations before swapping the container
            # --entrypoint overrides docker-entrypoint.sh so only the migration runs (not the app)
            docker run --rm \
              --entrypoint npx \
              --env-file /home/ec2-user/mirror-api.env \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
              prisma migrate deploy

            docker stop mirror-api 2>/dev/null || true
            docker rm   mirror-api 2>/dev/null || true
            docker run -d --name mirror-api --restart unless-stopped \
              --env-file /home/ec2-user/mirror-api.env \
              -p 3007:3007 \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            docker image prune -f
