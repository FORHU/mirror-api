name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: main

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR="${{ steps.login-ecr.outputs.registry }}/mirror-api"
          docker build -t "$ECR:${{ github.sha }}" -t "$ECR:latest" .
          docker push "$ECR:${{ github.sha }}"
          docker push "$ECR:latest"

      - name: Write env file
        env:
          DATABASE_URL:           ${{ secrets.DATABASE_URL }}
          REDIS_HOST:             ${{ secrets.REDIS_HOST }}
          REDIS_PORT:             ${{ secrets.REDIS_PORT }}
          REDIS_TTL_SECONDS:      ${{ secrets.REDIS_TTL_SECONDS }}
          ACCESS_TOKEN_SECRET:    ${{ secrets.ACCESS_TOKEN_SECRET }}
          ACCESS_TOKEN_EXPIRY:    ${{ secrets.ACCESS_TOKEN_EXPIRY }}
          REFRESH_TOKEN_SECRET:   ${{ secrets.REFRESH_TOKEN_SECRET }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION:             ${{ secrets.AWS_REGION }}
          AWS_VOICE_REGION:       ${{ secrets.AWS_VOICE_REGION }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME:     ${{ secrets.AWS_S3_BUCKET_NAME }}
          S3_CDN_URL:             ${{ secrets.S3_CDN_URL }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
          MAPBOX_SECRET_TOKEN:    ${{ secrets.MAPBOX_SECRET_TOKEN }}
          ORS_API_KEY:            ${{ secrets.ORS_API_KEY }}
          FASHN_API_KEY:          ${{ secrets.FASHN_API_KEY }}
          FASHN_BASE_URL:         ${{ secrets.FASHN_BASE_URL }}
          CHAT_WONDER_API_URL:    ${{ secrets.CHAT_WONDER_API_URL }}
          BASE_URL:               ${{ secrets.BASE_URL }}
          THIRD_PARTY_API_KEY:    ${{ secrets.THIRD_PARTY_API_KEY }}
          YOUCAM_API_KEY:         ${{ secrets.YOUCAM_API_KEY }}
          YOUCAM_API_URL:         ${{ secrets.YOUCAM_API_URL }}
          SKIN_ANALYSIS_ENABLED:  ${{ secrets.SKIN_ANALYSIS_ENABLED }}
          NODE_ENV:               production
          PORT:                   3007
        run: |
          cat > ${{ github.workspace }}/mirror-api.env << EOF
          DATABASE_URL=${DATABASE_URL}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS}
          ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
          ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY}
          REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          AWS_REGION=${AWS_REGION}
          AWS_VOICE_REGION=${AWS_VOICE_REGION}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
          S3_CDN_URL=${S3_CDN_URL}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}
          MAPBOX_SECRET_TOKEN=${MAPBOX_SECRET_TOKEN}
          ORS_API_KEY=${ORS_API_KEY}
          FASHN_API_KEY=${FASHN_API_KEY}
          FASHN_BASE_URL=${FASHN_BASE_URL}
          CHAT_WONDER_API_URL=${CHAT_WONDER_API_URL}
          BASE_URL=${BASE_URL}
          THIRD_PARTY_API_KEY=${THIRD_PARTY_API_KEY}
          YOUCAM_API_KEY=${YOUCAM_API_KEY}
          YOUCAM_API_URL=${YOUCAM_API_URL}
          SKIN_ANALYSIS_ENABLED=${SKIN_ANALYSIS_ENABLED}
          NODE_ENV=${NODE_ENV}
          PORT=${PORT}
          EOF

      - name: Copy env file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   mirror-api.env
          target:   /home/ec2-user/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            chmod 600 /home/ec2-user/mirror-api.env
            aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/mirror-api:${{ github.sha }}

            # Run migrations before swapping the container
            # --entrypoint overrides docker-entrypoint.sh so only the migration runs (not the app)
            docker run --rm \
              --entrypoint npx \
              --env-file /home/ec2-user/mirror-api.env \
              ${{ steps.login-ecr.outputs.registry }}/mirror-api:${{ github.sha }} \
              prisma migrate deploy

            docker stop mirror-api 2>/dev/null || true
            docker rm   mirror-api 2>/dev/null || true
            docker run -d --name mirror-api --restart unless-stopped \
              --env-file /home/ec2-user/mirror-api.env \
              -p 3007:3007 \
              ${{ steps.login-ecr.outputs.registry }}/mirror-api:${{ github.sha }}

            docker image prune -f
